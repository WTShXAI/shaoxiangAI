database:
  path: data/football_data.db
feature_engineering:
  add_interactions: true
  feature_selection:
    enabled: true
    importance_threshold: 0.015
hyperparameter_search:
  cv_splits: 3
  enabled: true
  max_combinations: 40
  optuna:
    enabled: true
    n_trials: 100
    objective_mode: balanced
  search_space:
    colsample_bytree:
    - 0.7
    - 0.85
    gamma:
    - 0
    - 0.1
    learning_rate:
    - 0.03
    - 0.05
    - 0.07
    max_depth:
    - 4
    - 6
    - 8
    min_child_weight:
    - 1
    - 5
    n_estimators:
    - 200
    - 400
    - 600
    reg_alpha:
    - 0
    - 0.3
    reg_lambda:
    - 0.5
    - 1.5
    subsample:
    - 0.7
    - 0.85
label:
  class_abbr:
    0: H
    1: D
    2: A
  classes:
    0: 主胜
    1: 平局
    2: 客胜
logging:
  console: true
  date_format: '%Y-%m-%d %H:%M:%S'
  file_encoding: utf-8
  file_prefix: football_model
  format: '%(asctime)s [%(levelname)s] %(name)s - %(message)s'
  level: INFO
model_registry:
  enabled: true
  path: saved_models/model_registry.json
odds_calibration:
  enabled: false
  lambda_reg: 0.2
  league_gamma_train: true
  use_market_league_prior: true
  max_samples: 200000
  train_years:
  - 2012
  - 2022
  val_years:
  - 2023
  - 2025
  risk_premium_optimize: true
  apply_risk_weight_loss: true
  heavy_rp_threshold: 8.0
  final_tournament_rp_feat: false
  separate_risk_gamma: true
score_output:
  display_top_n: 4
  store_top_n: 10
  min_display_prob: 0.03
  final_tournament_min_prob: 0.015
  force_include_risk_barrier: true
models:
  calibration:
    enabled: false
    method: isotonic
  class_weight:
    auto_optimize: false
    away_multiplier: 1.0
    draw_multiplier: 1.0
    enabled: false
    home_multiplier: 1.0
    optimize_on_new_data: false
    search_away_range:
    - 0.7
    - 0.8
    - 0.9
    - 1.0
    - 1.1
    - 1.2
    search_draw_range:
    - 0.8
    - 1.0
    - 1.2
    - 1.4
    - 1.6
    - 1.8
    - 2.0
    search_home_range:
    - 0.7
    - 0.8
    - 0.9
    - 1.0
    - 1.1
    - 1.2
  draw_calibration:
    enabled: false
    inflation_factor: 1.04
  draw_optimization:
    adaptive_draw_threshold_ratio: 1.1
    draw_weight_multiplier: 1.0
    min_draw_threshold: 0.2
    source: model_bridge_only
  draw_prior:
    d_probability_boost: 0.08
    drift_aware_boost: true
    drift_boost_max: 0.06
    drift_d_threshold: -0.5
    drift_mag_threshold: 1.0
    enabled: true
  dynamic_weights:
    coefficients:
      heur_consensus: 0.1
      heur_h2h: 0.22
      heur_rank_diff: 0.15
      heur_sigma: 0.18
      ridge_beta_dev: 0.2
      ridge_rank_diff: 0.1
      ridge_sigma: 0.1
      xgb_consensus: 0.12
      xgb_rank_diff: 0.25
      xgb_sigma: 0.15
    diversity_monitoring:
      enabled: true
      hhi_action: log
      hhi_threshold: 0.35
      log_level: WARNING
    enabled: true
    league_offsets:
      Bundesliga:
        heuristic: -0.01
        ridge: -0.01
        xgb: 0.02
      La Liga:
        heuristic: 0.0
        ridge: 0.0
        xgb: 0.0
      Ligue 1:
        heuristic: 0.02
        ridge: 0.0
        xgb: -0.01
      Premier League:
        heuristic: 0.0
        ridge: 0.0
        xgb: 0.0
      Serie A:
        heuristic: 0.02
        ridge: 0.0
        xgb: -0.01
    max_adjustment: 0.15
    max_weight: 0.6
    min_weight: 0.08
    use_league_profile: true
  elo:
    dynamic_k: true
    enabled: true
    heuristic_integration:
      blend_mode: average
      weight: 0.3
    home_advantage: 100.0
    init_rating: 1500.0
    k_base: 32.0
    scale: 400.0
    storage_path: saved_models/elo_ratings.json
  ensemble:
    heuristic_weight: 0.27
    lightgbm_weight: 0.18        # LEGACY v4.1 — 保留用于基线对比
    odds_expert_weight: 0.23
    ridge_weight: 0.05           # LEGACY v4.1 — 保留用于基线对比
    xgboost_weight: 0.18         # LEGACY v4.1 — 保留用于基线对比
    neural_net_weight: 0.09
  league_draw_prior:
    enabled: true
    global_d_rate: 0.257
    league_d_rates:
      Bundesliga: 0.238
      Campeonato Brasileiro: 0.261
      Champions League: 0.247
      Championship: 0.258
      Eredivisie: 0.24
      La Liga: 0.251
      Ligue 1: 0.263
      Premier League: 0.244
      Primeira Liga: 0.264
      Serie A: 0.281
  # LEGACY: v5.2.14 JEPA v5.0 已替代 GBDT, 此配置仅用于 v4.1 基线对比
  lightgbm:
    boosting_type: gbdt
    colsample_bytree: 0.8
    draw_weight_boost: 1.2
    early_stopping_rounds: 50
    learning_rate: 0.03
    max_depth: 7
    min_child_samples: 20
    min_split_gain: 0.01
    n_estimators: 800
    num_leaves: 63
    reg_alpha: 0.1
    reg_lambda: 1.0
    subsample: 0.8
    subsample_freq: 1
  odds_expert:
    boosting_type: gbdt
    colsample_bytree: 0.8
    draw_weight_boost: 1.3
    early_stopping_rounds: 50
    learning_rate: 0.05
    max_depth: 6
    min_child_samples: 50
    n_estimators: 600
    num_leaves: 31
    reg_alpha: 0.2
    reg_lambda: 1.5
    subsample: 0.8
    subsample_freq: 1
  p_final:
    crush_suppress: 0.8
    enabled: true
    sigma_trap_threshold: 3.38
    upset_multiplier: 1.25
  p_fusion:
    enabled: true
    heuristic_base: 0.14
    lgb_base: 0.28
    odds_boost_gbdt: 0.03
    odds_expert_base: 0.1
    odds_shift_heur: 0.02
    ridge_base: 0.05
    senti_shift: 0.05
    sigma_boost_lgb: 0.05
    sigma_shift_xgb: 0.03
    xgb_base: 0.28
  poisson:
    base_lambda: 2.72
    enabled: true
    heuristic_integration:
      blend_mode: average
      weight: 0.25
    home_advantage_factor: 1.08
    league_lambdas:
      Bundesliga: 3.12
      Champions League: 2.89
      Championship: 2.48
      Eredivisie: 3.05
      Europa League: 2.78
      La Liga: 2.59
      Ligue 1: 2.72
      MLS: 2.95
      Premier League: 2.85
      Primeira Liga: 2.55
      Serie A: 2.7
    max_goals: 6
  ridge:
    alpha: 1.0
    max_prob: 0.65
    temperature_scale: 3.0
  stacking:
    cv_folds: 5
    enabled: true
    method: lightgbm
    use_class_weights: true
  threshold_optimization:
    enabled: true
    th_a_max: 0.04
    th_a_min: -0.05
    th_a_step: 0.01
    th_d_max: 0.05
    th_d_min: -0.1
    th_d_step: 0.01
    th_h_max: 0.04
    th_h_min: -0.03
    th_h_step: 0.01
  weight_optimization:
    enabled: true
    grid_step: 0.05
    method: optuna
    n_trials: 200
    objective_mode: balanced
    train_ratio: 0.7
    val_ratio: 0.15
    w_ridge_range:
    - 0.08
    - 0.3
    w_xgb_range:
    - 0.2
    - 0.6
  xg:
    base_lambda: 2.72
    coef_away_win: 0.5
    coef_draw_adj: -0.15
    coef_home_win: 0.5
    enable_jitter: true
    enabled: true
    home_advantage_factor: 1.08
    jitter_range: 0.15
  # LEGACY: v5.2.14 JEPA v5.0 已替代 GBDT, 此配置仅用于 v4.1 基线对比
  xgboost:
    colsample_bytree: 0.8
    early_stopping_rounds: 50
    gamma: 0.05
    learning_rate: 0.03
    max_depth: 5
    min_child_weight: 3
    n_estimators: 500
    reg_alpha: 0.1
    reg_lambda: 1.0
    subsample: 0.8
    tree_method: hist
output:
  model_prefix: football_ensemble
  prediction_prefix: predictions
  report_prefix: evaluation_report
  timestamp_format: '%Y%m%d_%H%M%S'
paths:
  data_dir: data
  log_dir: logs
  model_dir: saved_models
  output_dir: output
  project_root: .
  report_dir: reports
