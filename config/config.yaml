    ACTIVE: 0.06
    NOISE: 0.1
  gate7:
    enabled: true
    weight: 10
    s_threshold: 0.8
    a_threshold: 0.65
    b_threshold: 0.55
value_betting:
  bet_records_table: bet_records
  enabled: true
  kelly_fraction: 0.25
  max_edge: 0.2
  max_stake: 0.1
  min_edge: 0.05
  track_roi: true
  value_threshold: 1.05
model:
