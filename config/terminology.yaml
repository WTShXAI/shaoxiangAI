# ═══════════════════════════════════════════════════════════════
# 哨响AI v4.0 — 专业术语词典 (Terminology Dictionary)
# ═══════════════════════════════════════════════════════════════
# 六大领域 · 50+ 术语 · 中英双语 · 领域映射 · 专家匹配
#
# 设计原则:
#   1. 每个术语含中英双语定义
#   2. 关联到具体专家领域 (domain)
#   3. 标注使用场景 (context)
#   4. 可被 TerminologyInjector 动态加载注入到推理链
#
# 用法:
#   from modules.output_schema import TerminologyInjector
#   TerminologyInjector.load_from_yaml("config/terminology.yaml")
#   TerminologyInjector.inject(reasoning_chain, domain="quantization")
# ═══════════════════════════════════════════════════════════════

version: "1.0.0"
created: "2026-06-18"
total_terms: 72

domains:
  # ────────────────────────────────────────────────────────────
  # 1. 赔率量化领域 (Odds Quantitative Analysis)
  # ────────────────────────────────────────────────────────────
  quantization:
    description: "赔率量化建模 — 赔率衍生特征、概率校准、赔率数学"
    primary_expert: "季泊松"
    color: "#6366f1"
    terms:
      - id: Q001
        zh: "隐含概率"
        en: "Implied Probability"
        definition: "从赔率反推的市场对事件发生概率的估计值，公式: P_implied = 1 / odds"
        formula: "P_implied = 1 / odds"
        context: "赔率分析、概率校准"
        tags: ["赔率", "概率", "基本面"]

      - id: Q002
        zh: "抽水率"
        en: "Overround / Margin"
        definition: "庄家在赔率中嵌入的利润空间。三分类下: margin = (1/H + 1/D + 1/A) - 1"
        formula: "margin = Σ(1/odds_i) - 1"
        context: "赔率结构分析、庄家利润评估"
        tags: ["赔率", "庄家", "利润率"]

      - id: Q003
        zh: "非均匀抽水"
        en: "Non-Uniform Margin Distribution"
        definition: "庄家在不同结果上分配不同比例的抽水，常用于引导资金流向或保护特定方向"
        context: "庄家意图分析、诱盘识别"
        tags: ["赔率", "庄家", "资金流"]

      - id: Q004
        zh: "赔率漂移一阶导数"
        en: "Odds Drift 1st Derivative"
        definition: "赔率随时间的变化率，反映市场资金的流动方向和速度"
        formula: "drift_1 = d(odds)/dt ≈ (odds_close - odds_open) / Δt"
        context: "市场信号、赛前资金流向"
        tags: ["赔率", "时序", "市场"]

      - id: Q005
        zh: "赔率漂移二阶导数"
        en: "Odds Drift 2nd Derivative"
        definition: "赔率变化率的加速度，反映市场情绪是否在加速/减速转变"
        formula: "drift_2 = d²(odds)/dt²"
        context: "市场情绪突变检测、关键时间点识别"
        tags: ["赔率", "时序", "拐点"]

      - id: Q006
        zh: "凯利指数"
        en: "Kelly Criterion / Kelly Index"
        definition: "衡量赔率偏离公平值的程度。正值表示赔率低估了该结果概率(有价值)，负值表示高估"
        formula: "Kelly = P_model - P_implied"
        context: "投注价值评估、赔率偏差检测"
        tags: ["赔率", "价值", "偏差"]

      - id: Q007
        zh: "水位震荡"
        en: "Odds Oscillation"
        definition: "赔率在短期内的反复波动，反映市场多空博弈激烈程度"
        context: "不确定性评估、市场分歧分析"
        tags: ["赔率", "波动", "不确定性"]

      - id: Q008
        zh: "RP风险溢价屏障"
        en: "Risk Premium Barrier"
        definition: "庄家通过极端赔率(极低或极高)设置的'不欢迎投注区'，通常用于保护庄家风险敞口"
        context: "庄家风控分析、危险区识别"
        tags: ["赔率", "风控", "庄家"]

      - id: Q009
        zh: "公平赔率"
        en: "Fair Odds"
        definition: "去除抽水后的真实概率对应的赔率，代表理论上'公平'的定价"
        formula: "Fair_Odds_i = 1 / (P_implied_i * (1 + margin))"
        context: "赔率校准、价值判断基准"
        tags: ["赔率", "校准", "公平值"]

      - id: Q010
        zh: "机构分歧度"
        en: "Bookmaker Divergence"
        definition: "多家博彩机构对同一场比赛赔率的标准差，反映市场对结果的不确定性和信息不对称程度"
        context: "不确定性量化、冷门预警"
        tags: ["赔率", "分歧", "不确定性"]

      - id: Q011
        zh: "赔率锁定信号"
        en: "Odds Lock Signal"
        definition: "多家机构赔率趋于一致且不再变动的时间点，通常标志庄家已掌握确定性信息"
        context: "信息优势检测、预测置信度提升"
        tags: ["赔率", "信号", "信息"]

      - id: Q012
        zh: "spread热度映射"
        en: "Spread-to-Favorite Mapping"
        definition: "让球盘口(spread)与热门胜率的统计映射规律。spread每翻倍≈热门胜率+10pp"
        context: "让球盘分析、实力差量化"
        tags: ["让球", "spread", "统计规律"]

  # ────────────────────────────────────────────────────────────
  # 2. 概率建模领域 (Probability Modeling)
  # ────────────────────────────────────────────────────────────
  probability:
    description: "概率建模 — 泊松分布、比分预测、进球模型"
    primary_expert: "季泊松"
    color: "#8b5cf6"
    terms:
      - id: P001
        zh: "泊松强度λ"
        en: "Poisson Intensity λ"
        definition: "泊松分布的唯一参数，表示单位时间内预期事件发生次数。在足球中代表球队的进球能力"
        formula: "P(X=k) = (λ^k * e^(-λ)) / k!"
        context: "进球数预测、比分分布计算"
        tags: ["泊松", "概率", "进球"]

      - id: P002
        zh: "Dixon-Coles修正"
        en: "Dixon-Coles Correction"
        definition: "对独立泊松假设的修正，引入低比分(0-0, 1-0, 0-1, 1-1)的依赖项ρ，提升低比分预测精度"
        context: "泊松模型改进、比分预测校准"
        tags: ["泊松", "修正", "低比分"]

      - id: P003
        zh: "双变量泊松"
        en: "Bivariate Poisson"
        definition: "同时建模主客队进球的联合泊松分布，允许两队进球率相关"
        context: "比分预测、相关性建模"
        tags: ["泊松", "联合分布", "比分"]

      - id: P004
        zh: "xG预期进球"
        en: "Expected Goals (xG)"
        definition: "基于射门位置、角度、类型等因素计算的一次射门的预期进球概率"
        context: "球队进攻质量评估、真实表现vs结果偏差"
        tags: ["xG", "射门", "质量"]

      - id: P005
        zh: "xGA预期失球"
        en: "Expected Goals Against (xGA)"
        definition: "对手对本队的预期进球总和，反映防守质量"
        context: "防守能力评估、球队实力量化"
        tags: ["xG", "防守", "质量"]

      - id: P006
        zh: "比分分布"
        en: "Score Distribution"
        definition: "基于泊松或双变量泊松模型计算的所有可能比分的概率分布"
        context: "波胆预测、最可能比分推荐"
        tags: ["比分", "分布", "波胆"]

      - id: P007
        zh: "进球时序分布"
        en: "Goal Timing Distribution"
        definition: "进球在不同时间段(0-15', 15-30', ...)的分布规律，反映球队的体能和战术节奏"
        context: "滚球策略、半全场分析"
        tags: ["时序", "进球", "节奏"]

      - id: P008
        zh: "对数强度"
        en: "Log-Intensity"
        definition: "泊松强度λ的对数形式 log(λ)，常用于回归建模以确保λ>0"
        formula: "log(λ) = β0 + β1*attack + β2*defense + ..."
        context: "泊松回归、特征工程"
        tags: ["泊松", "回归", "对数"]

      - id: P009
        zh: "过度离散"
        en: "Over-dispersion"
        definition: "实际进球方差大于泊松分布预测方差的现象，需要负二项分布或零膨胀模型修正"
        context: "模型诊断、分布选择"
        tags: ["泊松", "方差", "诊断"]

      - id: P010
        zh: "联赛风格DNA"
        en: "League Style DNA"
        definition: "不同联赛的进球率、主客场优势、平局率等统计特征，用于跨联赛预测校准"
        context: "联赛适配、先验调整"
        tags: ["联赛", "风格", "先验"]

  # ────────────────────────────────────────────────────────────
  # 3. 博弈论与庄家分析领域 (Game Theory)
  # ────────────────────────────────────────────────────────────
  game_theory:
    description: "博弈论与庄家分析 — 赔率逆向工程、庄家行为解读"
    primary_expert: "杜博弈"
    color: "#f59e0b"
    terms:
      - id: G001
        zh: "庄家风控信号"
        en: "Bookmaker Risk Control Signal"
        definition: "庄家通过赔率调整反映的内部风控状态。赔率不仅是定价，更是加密的风险管理协议"
        context: "核心分析框架、赔率解读的哲学基础"
        tags: ["庄家", "风控", "加密协议"]

      - id: G002
        zh: "赔率加密协议"
        en: "Odds as Encrypted Protocol"
        definition: "FootballAI核心理念: 庄家赔率不是单纯的市场定价信号，而是经过非线性变换的加密产物。预测=逆向工程还原庄家风控信号"
        context: "全系统方法论基石"
        tags: ["核心理念", "方法论", "逆向工程"]

      - id: G003
        zh: "诱盘模式"
        en: "Trap Odds Pattern"
        definition: "庄家通过赔率结构诱导市场资金流向特定方向的操作手法。典型模式: 浅盘大热、降赔升水、深盘诱杀"
        context: "庄家意图识别、反向操作信号"
        tags: ["庄家", "诱导", "陷阱"]

      - id: G004
        zh: "浅盘大热"
        en: "Shallow Handicap Hot Favorite"
        definition: "热门球队让球过浅(如应让1.5只开0.5)，吸引资金涌入热门方，实际庄家看好冷门"
        context: "诱盘识别、冷门预警"
        tags: ["让球", "热门", "陷阱"]

      - id: G005
        zh: "降赔升水"
        en: "Odds Drop with Rising Water"
        definition: "赔率下降但水位(返奖率)上升的背离现象，常见于庄家吸引资金但实际风控收紧"
        context: "赔率背离、市场操纵识别"
        tags: ["赔率", "水位", "背离"]

      - id: G006
        zh: "深盘诱杀"
        en: "Deep Handicap Trap"
        definition: "深盘下(如-2.5)庄家看似力挺强队，实则通过高赔率诱导资金，掩护冷门方向"
        context: "深盘风险、冷门检测"
        tags: ["让球", "深盘", "陷阱"]

      - id: G007
        zh: "收割区"
        en: "Harvesting Zone"
        definition: "庄家设置了极端不利赔率的区域，进入此区域的投注几乎必然亏损"
        context: "收割防护、风险规避"
        tags: ["庄家", "收割", "风险"]

      - id: G008
        zh: "波胆防线"
        en: "Correct Score Defense Line"
        definition: "庄家对特定比分开出异常赔率(过高或过低)，反映庄家对该比分的特别防范"
        context: "比分分析、庄家信息泄露"
        tags: ["比分", "庄家", "信息"]

      - id: G009
        zh: "抽水异常"
        en: "Abnormal Overround"
        definition: "抽水率偏离常规范围(通常5-8%)，极高抽水=不确定性高，极低抽水=庄家自信或竞争激烈"
        context: "不确定性评估、庄家信心分析"
        tags: ["抽水", "异常", "信心"]

      - id: G010
        zh: "市场共识偏差"
        en: "Market Consensus Deviation"
        definition: "市场主流预期与实际结果的系统性偏差，反映市场的认知盲区"
        context: "信息不对称挖掘、阿尔法机会"
        tags: ["市场", "共识", "偏差"]

  # ────────────────────────────────────────────────────────────
  # 4. 分类优化领域 (Classification Optimization)
  # ────────────────────────────────────────────────────────────
  imbalance:
    description: "分类优化 — 不平衡学习、Draw专项、冷门预测"
    primary_expert: "曾均衡"
    color: "#10b981"
    terms:
      - id: I001
        zh: "三分类准确率"
        en: "3-Way Classification Accuracy"
        definition: "H/D/A三分类的整体预测准确率 = 正确预测数 / 总预测数"
        context: "核心评价指标"
        tags: ["指标", "准确率", "三分类"]

      - id: I002
        zh: "Draw-F1"
        en: "Draw F1 Score"
        definition: "平局类别的F1分数 = 2 * (Precision_D * Recall_D) / (Precision_D + Recall_D)，v3.2基线=0.504"
        context: "平局预测专项指标"
        tags: ["指标", "F1", "平局"]

      - id: I003
        zh: "类别不平衡度"
        en: "Class Imbalance Ratio"
        definition: "足球三分类中H≈45%, D≈25%, A≈30%的自然分布，导致模型倾向于预测多数类"
        context: "不平衡学习的根本原因"
        tags: ["不平衡", "分布", "根本原因"]

      - id: I004
        zh: "Focal Loss"
        en: "Focal Loss"
        definition: "通过对易分类样本降权和难分类样本加权的损失函数。γ参数控制聚焦强度，α参数控制类别权重"
        formula: "FL(p_t) = -α_t * (1-p_t)^γ * log(p_t)"
        context: "不平衡学习、平局预测优化"
        tags: ["损失函数", "不平衡", "聚焦"]

      - id: I005
        zh: "代价敏感学习"
        en: "Cost-Sensitive Learning"
        definition: "为不同类别的误分类赋予不同代价的框架。例如: D→H误判代价 < H→D误判代价"
        context: "类别权重设定、业务损失对齐"
        tags: ["代价", "权重", "误判"]

      - id: I006
        zh: "时序安全SMOTE"
        en: "Time-Safe SMOTE"
        definition: "在时间序列数据上进行合成少数类过采样，确保不跨时间点合成以避免未来信息泄漏"
        context: "数据增强、时间序列安全"
        tags: ["SMOTE", "过采样", "时间安全"]

      - id: I007
        zh: "阈值联合寻优"
        en: "Joint Threshold Optimization"
        definition: "同时优化H/D/A三类的决策阈值(而非单一阈值)以最大化目标指标(如Macro-F1)"
        context: "决策阈值调优"
        tags: ["阈值", "优化", "联合"]

      - id: I008
        zh: "D-Gate门控"
        en: "Draw Gate"
        definition: "平局预测的专用门控机制。通过margin = P(D)-max(P(H),P(A))量化D预测置信度，低margin时降级为H/A"
        context: "平局预测质量控制、减少D误报"
        tags: ["门控", "平局", "质量控制"]

      - id: I009
        zh: "冷门预警"
        en: "Upset Alert"
        definition: "综合赔率异常、机构分歧、球队状态等多维信号对潜在冷门进行预警"
        context: "风险规避、冷门捕捉"
        tags: ["冷门", "预警", "风险"]

      - id: I010
        zh: "Macro-F1 vs Micro-F1"
        en: "Macro-F1 vs Micro-F1"
        definition: "Macro-F1: 各类别F1的简单平均(对少数类友好)。Micro-F1: 全局F1(受多数类主导)"
        context: "评价指标选择、不平衡场景"
        tags: ["指标", "F1", "不平衡"]

  # ────────────────────────────────────────────────────────────
  # 5. 集成学习领域 (Ensemble Learning)
  # ────────────────────────────────────────────────────────────
  ensemble:
    description: "集成学习 — Stacking、模型融合、动态权重"
    primary_expert: "荣合众"
    color: "#ec4899"
    terms:
      - id: E001
        zh: "Stacking集成"
        en: "Stacking Ensemble"
        definition: "多层模型架构: 多个基模型(Base Learners)的输出作为元学习器(Meta Learner)的输入特征进行最终预测"
        context: "核心融合架构"
        tags: ["集成", "多层", "融合"]

      - id: E002
        zh: "OOF诚实回测"
        en: "Honest Out-of-Fold Backtest"
        definition: "使用严格时间切分(pre-2023训练/2023+验证)的Out-of-Fold预测进行元模型训练，确保无数据泄漏"
        context: "元模型训练、防泄漏"
        tags: ["OOF", "时间切分", "防泄漏"]

      - id: E003
        zh: "时间切分验证"
        en: "Temporal Split Validation"
        definition: "按时间顺序切分训练/验证集，训练集全在验证集之前。FootballAI标准: pre-2023训练，2023+验证"
        context: "验证策略、防未来信息泄漏"
        tags: ["验证", "时间", "切分"]

      - id: E004
        zh: "元学习器"
        en: "Meta Learner"
        definition: "Stacking架构中的顶层模型，学习如何最优组合基模型预测。v3.2使用LightGBM作为元学习器"
        context: "融合决策、权重学习"
        tags: ["元学习", "融合", "顶层"]

      - id: E005
        zh: "MoE门控网络"
        en: "Mixture of Experts Gating"
        definition: "动态选择/加权不同子专家的门控机制，每个输入自动路由到最擅长的专家"
        context: "动态融合、自适应路由"
        tags: ["MoE", "门控", "动态"]

      - id: E006
        zh: "动态权重衰减"
        en: "Dynamic Weight Decay"
        definition: "根据基模型近期表现自动调整融合权重，表现持续下降的模型权重自动衰减"
        context: "自适应融合、退化处理"
        tags: ["权重", "衰减", "自适应"]

      - id: E007
        zh: "基模型贡献度"
        en: "Base Model Contribution"
        definition: "通过删除诊断(Leave-One-Out)或SHAP值量化每个基模型对最终融合预测的独立贡献"
        context: "模型评估、冗余检测"
        tags: ["贡献", "诊断", "评估"]

      - id: E008
        zh: "CalibratorSuite校准"
        en: "CalibratorSuite"
        definition: "概率校准套件(Platt/Isotonic/Temperature)，确保预测概率与实际频率一致"
        context: "概率校准、可靠性"
        tags: ["校准", "概率", "可靠性"]

  # ────────────────────────────────────────────────────────────
  # 6. 统计验证领域 (Statistical Validation)
  # ────────────────────────────────────────────────────────────
  math:
    description: "统计验证 — 假设检验、置信区间、效应量"
    primary_expert: "毕建模"
    color: "#06b6d4"
    terms:
      - id: M001
        zh: "95%置信区间"
        en: "95% Confidence Interval"
        definition: "在重复抽样下，区间包含真实参数的概率为95%"
        formula: "CI = estimate ± 1.96 * SE"
        context: "预测不确定性的统计表达"
        tags: ["置信区间", "不确定性", "统计"]

      - id: M002
        zh: "McNemar检验"
        en: "McNemar's Test"
        definition: "比较两个分类器在相同测试集上表现差异的统计检验，关注不一致预测对"
        context: "模型对比、A/B测试验证"
        tags: ["检验", "对比", "A/B"]

      - id: M003
        zh: "Cohen's d效应量"
        en: "Cohen's d Effect Size"
        definition: "量化两组数据差异的标准化度量。|d|<0.2=微小, 0.2-0.5=小, 0.5-0.8=中, >0.8=大"
        formula: "d = (M1 - M2) / SD_pooled"
        context: "效果量化、实用显著性"
        tags: ["效应量", "量化", "显著性"]

      - id: M004
        zh: "贝叶斯因子"
        en: "Bayes Factor (BF)"
        definition: "量化证据对两个假设支持程度的比率。BF>3=中等证据, BF>10=强证据"
        formula: "BF10 = P(Data|H1) / P(Data|H0)"
        context: "假设检验、证据量化"
        tags: ["贝叶斯", "因子", "证据"]

      - id: M005
        zh: "统计功效"
        en: "Statistical Power"
        definition: "当备择假设为真时正确拒绝原假设的概率 = 1 - β(Type II Error)"
        context: "实验设计、样本量估算"
        tags: ["功效", "样本量", "设计"]

      - id: M006
        zh: "概念漂移检测"
        en: "Concept Drift Detection"
        definition: "监测模型输入特征分布或目标变量关系随时间变化的统计方法"
        context: "模型退化预警、触发重训"
        tags: ["漂移", "监控", "退化"]

      - id: M007
        zh: "PSI稳定性指数"
        en: "Population Stability Index"
        definition: "衡量特征分布变化的指标。PSI<0.1=稳定, 0.1-0.25=轻微变化, >0.25=显著漂移"
        formula: "PSI = Σ[(Actual% - Expected%) * ln(Actual% / Expected%)]"
        context: "特征漂移监控"
        tags: ["PSI", "稳定性", "漂移"]

      - id: M008
        zh: "DeLong AUC检验"
        en: "DeLong's Test for AUC"
        definition: "比较两个ROC曲线下面积(AUC)是否显著不同的非参数检验"
        context: "模型对比验证"
        tags: ["AUC", "检验", "对比"]

      - id: M009
        zh: "Bonferroni校正"
        en: "Bonferroni Correction"
        definition: "多重比较时的显著性水平校正: α_adjusted = α / n_comparisons"
        context: "多重检验控制、避免假阳性"
        tags: ["校正", "多重比较", "显著性"]

      - id: M010
        zh: "ECE期望校准误差"
        en: "Expected Calibration Error"
        definition: "衡量预测概率与真实频率之间偏差的指标。将概率分桶后计算加权平均误差"
        formula: "ECE = Σ(|B_k|/n) * |acc(B_k) - conf(B_k)|"
        context: "概率校准评估"
        tags: ["校准", "误差", "ECE"]

  # ────────────────────────────────────────────────────────────
  # 7. 时序深度学习领域 (Temporal DL)
  # ────────────────────────────────────────────────────────────
  temporal:
    description: "时序深度学习 — 序列建模、状态追踪、NN架构"
    primary_expert: "施时序"
    color: "#3b82f6"
    terms:
      - id: T001
        zh: "Transformer注意力"
        en: "Transformer Attention"
        definition: "自注意力机制，通过计算序列中所有位置对的相关性来捕捉长距离依赖关系"
        context: "球队状态序列建模"
        tags: ["Transformer", "注意力", "序列"]

      - id: T002
        zh: "LSTM隐状态"
        en: "LSTM Hidden State"
        definition: "长短期记忆网络的内部状态向量，捕捉时间序列中的长期依赖模式"
        context: "球队状态追踪、趋势建模"
        tags: ["LSTM", "隐状态", "记忆"]

      - id: T003
        zh: "序列漂移"
        en: "Sequence Drift"
        definition: "球队状态随时间的变化轨迹，反映球队实力的上升/下降趋势"
        context: "球队趋势分析、拐点检测"
        tags: ["漂移", "趋势", "球队"]

      - id: T004
        zh: "状态向量"
        en: "State Vector"
        definition: "从序列模型中提取的球队当前状态的低维表示，可用于下游预测任务"
        context: "特征工程、状态表征"
        tags: ["状态", "向量", "表征"]

