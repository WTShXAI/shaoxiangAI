# 哨响AI - JEPA v5 模型配置
# ============================

jepa:
  # 嵌入维度
  embed_dim: 128
  odds_semantic_dim: 16

  # Rollout 推演
  n_steps: 6
  n_paths: 50
  noise_scale: 0.04

  # VICReg Loss 系数
  sim_coeff: 10.0
  var_coeff: 1.0
  cov_coeff: 0.04
  pred_coeff: 25.0

  # 防坍塌
  triplet_coeff: 2.0
  home_bias_thresh: 0.05
  dals_coeff: 0.5

  # 训练参数
  learning_rate: 0.001
  weight_decay: 0.00001
  batch_size: 256
  epochs: 50
  early_stop_patience: 10
  ema_tau: 0.996

  # 数据
  train_cutoff: "2023-01-01"
  val_cutoff: "2024-01-01"

  # 集成
  stacking_weight: 0.08
  feature_importance_threshold: 0.10

  # 推理
  device: "cpu"

  # MoE Gate (Phase 2)
  num_experts: 3
  gate_dim: 13
