<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>哨响AI 赔率采集</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 280px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0a0e17; color: #e0e0e0; padding: 16px; font-size: 13px; }
    h2 { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .sub { font-size: 11px; color: #5a6a80; margin-bottom: 12px; }
    .status { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.on { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .dot.off { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
    .status-text { font-size: 12px; color: #8899aa; }
    button { width: 100%; padding: 8px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: #1a6ff5; color: #fff; }
    .btn-primary:hover { background: #1558cc; }
    .btn-secondary { background: #1a2535; color: #8899aa; margin-top: 8px; }
    .btn-secondary:hover { background: #243040; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .info { margin-top: 10px; padding: 8px; border-radius: 6px; background: #111822; border: 1px solid #1e2a38; font-size: 11px; color: #5a6a80; word-break: break-all; }
    .info .label { color: #3d5068; font-size: 10px; margin-bottom: 2px; }
    .decision { margin-top: 10px; padding: 8px; border-radius: 6px; font-size: 11px; }
    .decision.bet { background: #064e3b30; border: 1px solid #065f4640; color: #34d399; }
    .decision.pass { background: #1e293b30; border: 1px solid #33415540; color: #94a3b8; }
  </style>
</head>
<body>
  <h2>哨响AI 赔率采集</h2>
  <div class="sub">浏览器插件 v1.0 · 只读DOM不下单</div>

  <div class="status">
    <div class="dot off" id="dot"></div>
    <span class="status-text" id="statusText">检查连接...</span>
  </div>

  <button class="btn-primary" id="scanBtn">立即扫描当前页</button>
  <button class="btn-secondary" id="retryBtn">重新连接 Bridge</button>

  <div class="info" id="lastMatch" style="display:none">
    <div class="label">上次推送</div>
    <span id="lastMatchText">-</span>
  </div>
  <div class="decision pass" id="decisionBox" style="display:none"></div>

  <script src="popup.js"></script>
</body>
</html>
