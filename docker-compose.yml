  #     POSTGRES_USER: shaoxiang
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
  #     POSTGRES_DB: footballai
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   networks:
  #     - shaoxiang-net

networks:
  shaoxiang-net:
    driver: bridge

