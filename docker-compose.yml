version: '3.8'
services:
  backend:
    build: .
    ports:
      - "9000:9000"
    volumes:
      - ./data:/app/data
      - ./saved_models:/app/saved_models
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=9000
    command: python main.py backend --dev
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./static:/usr/share/nginx/html
    depends_on:
      - backend