# =============================================================================
# 哨响AI - CI/CD 工作流
# =============================================================================
# 触发: push / pull_request → main 分支
# 阶段: lint → pytest → build
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ═══════════════════════════════════════════════
  # Lint
  # ═══════════════════════════════════════════════
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 flake8-bugbear
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          flake8 . --count --statistics \
            --show-source \
            --max-line-length=120 \
            --ignore=E203,E266,E501,W503,F841,E402,F403,F401 \
            --exclude=.venv,.venv_314_backup,__pycache__,build,dist,.git,*.egg-info

  # ═══════════════════════════════════════════════
  # Test
  # ═══════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --cov=. --cov-report=term-missing \
            --ignore=tests/test_heavy \
            -x --timeout=120

  # ═══════════════════════════════════════════════
  # Build (Docker 镜像)
  # ═══════════════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: footballai-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Test Docker image (smoke test)
        run: |
          docker run -d --name footballai-test -p 8000:8000 footballai-backend:ci-${{ github.sha }}
          sleep 10
          docker stop footballai-test
          docker rm footballai-test
