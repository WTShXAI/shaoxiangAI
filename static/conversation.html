<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>哨响AI · 智能足球预测助手</title>
<style>
:root {
  --bg: #0f1117; --sidebar: #151821; --card: #1a1d2b;
  --border: #252836; --text: #e4e7ed; --dim: #878b9e;
  --accent: #3b82f6; --accent2: #6366f1; --gold: #f59e0b;
  --green: #10b981; --red: #ef4444; --purple: #8b5cf6;
  --radius: 12px; --msg-radius: 18px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }

/* ── Layout ── */
.app { display:flex; height:100vh; }
.sidebar { width:260px; background:var(--sidebar); display:flex; flex-direction:column; border-right:1px solid var(--border); flex-shrink:0; }
.main { flex:1; display:flex; flex-direction:column; min-width:0; }

/* ── Sidebar ── */
.sidebar-header { padding:16px 20px; border-bottom:1px solid var(--border); }
.sidebar-header h2 { font-size:1.1em; background:linear-gradient(135deg,#3b82f6,#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.sidebar-header .ver { font-size:0.7em; color:var(--dim); }
.sidebar-body { flex:1; overflow-y:auto; padding:12px; }
.sidebar-footer { padding:12px; border-top:1px solid var(--border); }
.quick-btn { display:block; width:100%; padding:10px 12px; margin-bottom:6px; background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--text); cursor:pointer; text-align:left; font-size:0.85em; transition:0.15s; }
.quick-btn:hover { border-color:var(--accent); background:#1e2033; }
.quick-btn .icon { margin-right:6px; }
.match-card { padding:10px 12px; margin:4px 0; background:var(--card); border-radius:8px; border:1px solid var(--border); font-size:0.78em; cursor:pointer; transition:0.15s; }
.match-card:hover { border-color:var(--accent); }
.match-card .teams { font-weight:600; }
.match-card .time { color:var(--dim); font-size:0.85em; }
.match-card .score { color:var(--accent); font-weight:700; }

/* ── Chat Header ── */
.chat-header { padding:12px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
.chat-header .status-dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.chat-header .title { font-weight:600; font-size:0.95em; }
.chat-header .subtitle { font-size:0.75em; color:var(--dim); }

/* ── Chat Messages ── */
.chat-area { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
.msg { display:flex; gap:8px; max-width:85%; animation:fadeIn 0.25s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.msg.user { align-self:flex-end; flex-direction:row-reverse; }
.msg.bot { align-self:flex-start; }
.msg .avatar { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.1em; flex-shrink:0; }
.msg.user .avatar { background:var(--accent); }
.msg.bot .avatar { background:var(--purple); }
.msg .bubble { padding:10px 16px; border-radius:var(--msg-radius); line-height:1.6; font-size:0.9em; word-break:break-word; }
.msg.user .bubble { background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
.msg.bot .bubble { background:var(--card); border:1px solid var(--border); border-bottom-left-radius:4px; }
.msg .bubble pre { background:rgba(0,0,0,0.3); padding:10px 14px; border-radius:8px; overflow-x:auto; margin:8px 0; font-size:0.85em; white-space:pre-wrap; }
.msg .bubble table { width:100%; border-collapse:collapse; margin:8px 0; font-size:0.85em; }
.msg .bubble th, .msg .bubble td { padding:6px 10px; border:1px solid var(--border); text-align:center; }
.msg .bubble th { background:rgba(59,130,246,0.15); color:var(--accent); }
.msg .bubble h1,.msg .bubble h2,.msg .bubble h3 { margin:8px 0 4px; }
.msg .bubble h2 { font-size:1.05em; color:var(--accent); }
.msg .bubble strong { color:#fbbf24; }

/* ── Predict Card ── */
.predict-card { margin:8px 0; padding:16px; background:linear-gradient(135deg,#1e1b4b,#0f172a); border:1px solid var(--purple); border-radius:var(--radius); }
.predict-card .pick { font-size:1.3em; font-weight:800; margin-bottom:8px; }
.predict-card .pick.H { color:var(--green); }
.predict-card .pick.D { color:var(--gold); }
.predict-card .pick.A { color:var(--red); }
.predict-card .probs-row { display:flex; gap:20px; margin:10px 0; }
.predict-card .prob-item { text-align:center; flex:1; }
.predict-card .prob-val { font-size:1.3em; font-weight:700; }
.predict-card .prob-val.h { color:var(--green); }
.predict-card .prob-val.d { color:var(--gold); }
.predict-card .prob-val.a { color:var(--red); }
.predict-card .prob-label { font-size:0.75em; color:var(--dim); }
.predict-card .tags { display:flex; gap:6px; flex-wrap:wrap; margin:6px 0; }
.predict-card .tag { padding:2px 8px; border-radius:10px; font-size:0.72em; font-weight:600; }
.tag-danger { background:rgba(239,68,68,0.2); color:#f87171; }
.tag-warn { background:rgba(245,158,11,0.2); color:#fbbf24; }
.tag-info { background:rgba(59,130,246,0.2); color:#60a5fa; }
.tag-safe { background:rgba(16,185,129,0.2); color:#34d399; }

/* ── Input ── */
.chat-input { padding:12px 20px 16px; border-top:1px solid var(--border); display:flex; gap:10px; align-items:flex-end; }
.chat-input textarea { flex:1; background:var(--card); border:1px solid var(--border); color:var(--text); padding:10px 14px; border-radius:var(--radius); font-size:0.9em; font-family:inherit; resize:none; min-height:42px; max-height:120px; outline:none; }
.chat-input textarea:focus { border-color:var(--accent); }
.chat-input button { width:42px; height:42px; border-radius:50%; background:var(--accent); color:#fff; border:none; cursor:pointer; font-size:1.2em; transition:0.15s; flex-shrink:0; }
.chat-input button:hover { background:#2563eb; }
.chat-input button:disabled { opacity:0.4; cursor:not-allowed; }

/* ── Typing indicator ── */
.typing { display:flex; gap:4px; padding:10px 16px; }
.typing span { width:6px; height:6px; border-radius:50%; background:var(--dim); animation:bounce 1.4s infinite; }
.typing span:nth-child(2) { animation-delay:0.2s; }
.typing span:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.3} 30%{transform:translateY(-6px);opacity:1} }

/* ── Scrollbar ── */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }

/* ── Analysis Card ── */
.analysis-card { margin:8px 0; padding:14px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); }
.analysis-card .section-title { font-size:0.85em; color:var(--accent); font-weight:700; margin-bottom:6px; }
.analysis-card .point { font-size:0.82em; padding:3px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
</style>
</head>
<body>

<div class="app">
  <!-- ── Sidebar ── -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>⚽ 哨响AI</h2>
      <div class="ver">v4.1 · 六层智能引擎</div>
    </div>
    <div class="sidebar-body">
      <div style="margin-bottom:12px;">
        <div style="font-size:0.8em;color:var(--dim);margin-bottom:8px;">💡 快速提问</div>
        <button class="quick-btn" onclick="sendQuick('今晚有什么比赛？')"><span class="icon">📅</span>今晚有什么比赛？</button>
        <button class="quick-btn" onclick="sendQuick('世界杯积分榜')"><span class="icon">🏆</span>世界杯积分榜</button>
        <button class="quick-btn" onclick="sendQuick('葡萄牙 vs 英格兰 2.10 3.30 3.60 怎么看')"><span class="icon">🔮</span>赔率分析示例</button>
        <button class="quick-btn" onclick="sendQuick('系统健康状态')"><span class="icon">💚</span>系统健康状态</button>
      </div>
      <div>
        <div style="font-size:0.8em;color:var(--dim);margin-bottom:8px;">📡 今日赛程</div>
        <div id="fixturesList"><span style="color:var(--dim);font-size:0.8em;">加载中...</span></div>
      </div>
    </div>
    <div class="sidebar-footer">
      <div id="wsStatus" style="font-size:0.75em;color:var(--dim);">
        <span class="status-dot" style="display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;margin-right:4px;"></span>API 已连接
      </div>
    </div>
  </div>

  <!-- ── Main Chat ── -->
  <div class="main">
    <div class="chat-header">
      <div class="status-dot" id="healthDot"></div>
      <div>
        <div class="title">哨响AI 智能助手</div>
        <div class="subtitle">六层架构 · 12专家协同 · D-Gate陷阱检测</div>
      </div>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="msg bot">
        <div class="avatar">🤖</div>
        <div class="bubble">
          👋 你好！我是**哨响AI v4.1**，一个足球预测智能助手。<br><br>
          <strong>我能做什么：</strong><br>
          🔮 <strong>预测比赛</strong> — 输入 "巴西 vs 阿根廷 2.10 3.30 3.60"<br>
          📅 <strong>查询赛程</strong> — 问 "今晚有什么比赛"<br>
          🏆 <strong>积分榜/射手榜</strong> — 问 "世界杯积分榜"<br>
          📸 <strong>截图分析</strong> — 上传赔率截图自动识别<br>
          🏦 <strong>庄家操盘推演</strong> — 自动生成三套赔率方案<br><br>
          直接在下方输入开始吧 ⚽
        </div>
      </div>
    </div>

    <div class="chat-input">
      <textarea id="userMsg" rows="1" placeholder="输入比赛信息，如：葡萄牙 vs 英格兰 2.10 3.30 3.60"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
      <button onclick="sendMessage()" id="sendBtn" title="发送">➤</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// 状态
// ═══════════════════════════════════════════════
const API = window.location.origin;
let isStreaming = false;
let currentBotBubble = null;

// ═══════════════════════════════════════════════
// 初始化
// ═══════════════════════════════════════════════
async function init() {
  checkHealth();
  loadFixtures();
  document.getElementById('userMsg').focus();
}

// ═══════════════════════════════════════════════
// 健康检查
// ═══════════════════════════════════════════════
async function checkHealth() {
  try {
    const r = await fetch(`${API}/api/v1/chat/health`);
    const d = await r.json();
    document.getElementById('healthDot').style.background = '#10b981';
    document.getElementById('wsStatus').innerHTML = '<span style="display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;margin-right:4px;"></span>API v' + d.version;
  } catch(e) {
    document.getElementById('healthDot').style.background = '#ef4444';
  }
}

// ═══════════════════════════════════════════════
// 加载赛程
// ═══════════════════════════════════════════════
async function loadFixtures() {
  try {
    const r = await fetch(`${API}/api/v1/fixtures/upcoming`);
    const d = await r.json();
    const all = [...(d.today||[]), ...(d.tomorrow||[])];
    if (all.length === 0) {
      document.getElementById('fixturesList').innerHTML = '<span style="color:var(--dim);font-size:0.8em;">暂无赛程</span>';
      return;
    }
    let html = '';
    for (const m of all.slice(0, 12)) {
      const scoreStr = m.score_home != null ? ` <span class="score">${m.score_home}-${m.score_away}</span>` : '';
      html += `<div class="match-card" onclick="sendQuick('${m.home} vs ${m.away} 预测分析')">
        <span class="time">${m.time_local||''}</span> <span class="teams">${m.home} vs ${m.away}</span>${scoreStr}
        ${m.group ? '<span style="color:var(--dim);font-size:0.8em">'+m.group+'</span>' : ''}
      </div>`;
    }
    document.getElementById('fixturesList').innerHTML = html;
  } catch(e) {
    document.getElementById('fixturesList').innerHTML = '<span style="color:var(--dim);font-size:0.8em;">加载失败</span>';
  }
}

// ═══════════════════════════════════════════════
// 快捷发送
// ═══════════════════════════════════════════════
function sendQuick(msg) {
  document.getElementById('userMsg').value = msg;
  sendMessage();
}

// ═══════════════════════════════════════════════
// 发送消息
// ═══════════════════════════════════════════════
async function sendMessage() {
  if (isStreaming) return;
  const textarea = document.getElementById('userMsg');
  const msg = textarea.value.trim();
  if (!msg) return;

  isStreaming = true;
  textarea.value = '';
  document.getElementById('sendBtn').disabled = true;

  // 添加用户消息
  addMessage('user', msg);
  // 添加机器人占位
  currentBotBubble = addBotPlaceholder();

  scrollToBottom();

  try {
    const response = await fetch(`${API}/api/v1/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, session_id: 'web-chat' })
    });

    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          handleSSE(data);
        } catch(e) {}
      }
    }
  } catch(e) {
    updateBotContent('<div style="color:var(--red)">❌ 连接失败: ' + e.message + '<br>请确认后端已启动 (python main.py backend --dev --port 8000)</div>');
  }

  isStreaming = false;
  document.getElementById('sendBtn').disabled = false;
  textarea.focus();
  scrollToBottom();
}

// ═══════════════════════════════════════════════
// SSE 事件处理
// ═══════════════════════════════════════════════
let textBuffer = '';

function handleSSE(data) {
  if (data.type === 'text') {
    textBuffer += data.content;
    updateBotContent(formatMarkdown(textBuffer));
  } else if (data.type === 'predict_card') {
    const card = data.data;
    textBuffer += renderPredictCard(card);
    updateBotContent(formatMarkdown(textBuffer));
  } else if (data.type === 'error') {
    textBuffer += '\n\n<span style="color:var(--red)">⚠️ ' + data.content + '</span>';
    updateBotContent(formatMarkdown(textBuffer));
  } else if (data.type === 'done') {
    // 完成
  }
}

// ═══════════════════════════════════════════════
// 渲染预测卡片
// ═══════════════════════════════════════════════
function renderPredictCard(card) {
  const predMap = { 'H':'主胜','D':'平局','A':'客胜','主胜':'主胜','平局':'平局','客胜':'客胜' };
  const pred = predMap[card.prediction] || card.prediction || '?';
  const clsMap = { '主胜':'H','平局':'D','客胜':'A' };
  const cls = clsMap[pred] || '';

  let tags = '';
  if (card.d_gate_active) tags += '<span class="tag tag-warn">D-Gate-'+card.d_gate_mode+'</span>';
  if (card.risk_tag === 'ignore_draw') tags += '<span class="tag tag-danger">诱平陷阱</span>';
  else if (card.risk_tag === 'favor_draw') tags += '<span class="tag tag-info">利好平局</span>';
  else if (card.risk_tag === 'weak_draw') tags += '<span class="tag tag-warn">平局偏低</span>';
  if (card.trap_warnings && card.trap_warnings.length > 0) {
    for (const t of card.trap_warnings.slice(0,2)) {
      tags += '<span class="tag tag-danger">'+t.description+'</span>';
    }
  }

  let scoresHtml = '';
  if (card.scores && card.scores.length > 0) {
    scoresHtml = '<div style="margin-top:8px;font-size:0.82em;"><strong>⚽ 比分预测:</strong> ';
    for (const s of card.scores) {
      const stars = '⭐'.repeat(s.star||0);
      scoresHtml += `<span style="margin:0 6px;">${s.score} (${s.prob})${stars} ${s.tag||''}</span>`;
    }
    scoresHtml += '</div>';
  }

  let analysisHtml = '';
  if (card.analysis) {
    const a = card.analysis;
    analysisHtml = '<div class="analysis-card">';
    analysisHtml += '<div class="section-title">📊 赔率深度分析</div>';
    if (a.verdict_cn) analysisHtml += '<div>D-Gate判定: <strong>'+a.verdict_cn+'</strong> | 风险: <strong>'+a.risk+'</strong></div>';
    if (a.analysis) {
      for (const p of a.analysis) {
        const colorMap = {safe: 'var(--green)', warn: 'var(--gold)', draw: 'var(--purple)', info: 'var(--accent)'};
        analysisHtml += '<div class="point" style="color:'+(colorMap[p.color]||'var(--dim)')+'">['+p.tag+'] '+p.text+'</div>';
      }
    }
    analysisHtml += '</div>';
  }

  let impliedHtml = '';
  if (card.implied) {
    impliedHtml = '<div style="font-size:0.82em;color:var(--dim);margin-top:6px;">📈 市场隐含: 主'+(card.implied.home*100).toFixed(1)+'% / 平'+(card.implied.draw*100).toFixed(1)+'% / 客'+(card.implied.away*100).toFixed(1)+'%</div>';
  }

  return `
<div class="predict-card">
  <div class="pick ${cls}">🔮 预测: ${pred} ${card.confidence ? '('+(card.confidence*100).toFixed(0)+'%置信度)' : ''}</div>
  <div class="probs-row">
    <div class="prob-item"><div class="prob-val h">${(card.h_prob*100).toFixed(1)}%</div><div class="prob-label">主胜</div></div>
    <div class="prob-item"><div class="prob-val d">${(card.d_prob*100).toFixed(1)}%</div><div class="prob-label">平局</div></div>
    <div class="prob-item"><div class="prob-val a">${(card.a_prob*100).toFixed(1)}%</div><div class="prob-label">客胜</div></div>
  </div>
  ${tags ? '<div class="tags">'+tags+'</div>' : ''}
  ${impliedHtml}
  ${scoresHtml}
  ${analysisHtml}
  <div style="font-size:0.72em;color:var(--dim);margin-top:8px;">⏱ 推理耗时: ${card.time_ms||'?'}ms</div>
</div>`;
}

// ═══════════════════════════════════════════════
// Markdown简易渲染
// ═══════════════════════════════════════════════
function formatMarkdown(text) {
  // 转义HTML
  let html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // 粗体
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // 标题
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // 表格 (简单处理)
  html = html.replace(/\|(.+)\|/g, function(m) {
    const cells = m.split('|').filter(c => c.trim());
    const isHeader = /[-:]+/.test(cells[0]||'');
    if (isHeader) return '';
    const tag = m.includes('---') ? '' : '<tr>'+cells.map(c => '<td>'+c.trim()+'</td>').join('')+'</tr>';
    return tag;
  });
  // emoji
  html = html.replace(/✅/g, '<span style="color:var(--green)">✅</span>');
  html = html.replace(/❌/g, '<span style="color:var(--red)">❌</span>');
  html = html.replace(/⚠️/g, '<span style="color:var(--gold)">⚠️</span>');
  html = html.replace(/🔴/g, '<span style="color:var(--red)">🔴</span>');
  // 换行
  html = html.replace(/\n/g, '<br>');

  return html;
}

// ═══════════════════════════════════════════════
// DOM操作
// ═══════════════════════════════════════════════
function addMessage(role, content) {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `
    <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
    <div class="bubble">${content}</div>`;
  chatArea.appendChild(div);
  return div.querySelector('.bubble');
}

function addBotPlaceholder() {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatArea.appendChild(div);
  textBuffer = '';
  return div.querySelector('.bubble');
}

function updateBotContent(html) {
  if (currentBotBubble) {
    currentBotBubble.innerHTML = html || '<div class="typing"><span></span><span></span><span></span></div>';
  }
}

function scrollToBottom() {
  const chatArea = document.getElementById('chatArea');
  setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 50);
}
