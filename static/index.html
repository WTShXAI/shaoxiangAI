<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>哨响AI v5.2.12 — 实时预测仪表盘</title>
<style>
  :root { --bg: #0a0e17; --card: #111827; --text: #e2e8f0; --accent: #3b82f6; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
  .container { max-width: 1200px; margin: 0 auto; }
  .header { text-align: center; padding: 40px 0; border-bottom: 2px solid var(--accent); }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
  .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #1e293b; }
  .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
  .status { margin-top: 10px; font-size: 0.9em; color: #94a3b8; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>⚽ 哨响AI 实时预测中心</h1>
    <p>D-Gate v5.3 引擎 | Docker 容器化部署</p>
    <button class="btn" onclick="fetchPredictions()">🔄 刷新真实赛果预测</button>
  </div>
  <div id="results" class="grid"></div>
</div>
<script>
  async function fetchPredictions() {
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '<p class="status">正在连接后端 API...</p>';
    try {
      // 假设后端有一个获取最新预测的接口
      const response = await fetch('/api/v1/predict/latest'); 
      if (!response.ok) throw new Error('API 请求失败');
      const data = await response.json();
      
      resultsDiv.innerHTML = '';
      data.forEach(match => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h3>${match.home} vs ${match.away}</h3>
          <p><strong>预测比分:</strong> ${match.prediction}</p>
          <p><strong>实际赛果:</strong> ${match.actual || '待赛'}</p>
          <p class="status">置信度: ${match.confidence || 'N/A'}</p>
        `;
        resultsDiv.appendChild(card);
      });
    } catch (error) {
      resultsDiv.innerHTML = `<p class="status" style="color:red">❌ 连接失败: ${error.message}<br>请确保后端已在 Docker 中启动。</p>`;
    }
  }
  // 页面加载时自动尝试获取
  fetchPredictions();
</script>
</body>
</html>
