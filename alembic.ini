# =============================================================================
# 哨响AI - Alembic 数据库迁移配置
# =============================================================================
# 用法:
#   alembic revision --autogenerate -m "描述"
#   alembic upgrade head
# =============================================================================

[alembic]
# 数据库 URL (从 settings 读取, 此值为占位)
sqlalchemy.url = sqlite:///./data/football_data.db

# 迁移脚本路径
script_location = alembic

# SQL 输出格式
# sqlalchemy.module_prefix = %(schema)s

# 日志
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
