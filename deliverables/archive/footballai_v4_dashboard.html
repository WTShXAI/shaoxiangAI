<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>哨响AI v4.0 — 多专家协同分析系统</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root {
  --bg: #0a0e17; --card: #111827; --border: #1e293b;
  --text: #e2e8f0; --dim: #94a3b8; --accent: #3b82f6;
  --gold: #f59e0b; --green: #10b981; --red: #ef4444;
  --purple: #8b5cf6; --pink: #ec4899;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.header { background:linear-gradient(135deg,#0f172a,#1e1b4b,#0f172a); padding:20px 32px; border-bottom:2px solid var(--accent); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
.header h1 { font-size:1.6em; background:linear-gradient(135deg,#3b82f6,#06b6d4,#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.header .status { display:flex; gap:16px; align-items:center; }
.badge { padding:4px 12px; border-radius:12px; font-size:0.8em; font-weight:600; }
.badge-green { background:rgba(16,185,129,0.2); color:#34d399; border:1px solid #34d399; }
.badge-gold { background:rgba(245,158,11,0.2); color:#fbbf24; border:1px solid #fbbf24; }
.main { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:20px; max-width:1400px; margin:0 auto; }
@media(max-width:900px){ .main{grid-template-columns:1fr;} }
.card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; }
.card h2 { font-size:1.1em; color:var(--accent); margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.form-row { display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
.form-row label { min-width:60px; color:var(--dim); font-size:0.85em; display:flex; align-items:center; }
input, select { background:#1e293b; border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:6px; font-size:0.9em; flex:1; min-width:100px; }
input:focus, select:focus { outline:none; border-color:var(--accent); }
.btn { padding:8px 20px; border-radius:6px; font-size:0.9em; font-weight:600; cursor:pointer; border:none; transition:0.2s; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:#2563eb; }
.btn-secondary { background:var(--purple); color:#fff; }
.result-box { margin-top:12px; padding:14px; background:rgba(59,130,246,0.08); border-radius:8px; border:1px solid rgba(59,130,246,0.2); }
.result-box .top-pick { font-size:1.4em; font-weight:800; margin-bottom:6px; }
.result-box .probs { display:flex; gap:20px; margin:8px 0; }
.result-box .prob-item { text-align:center; }
.result-box .prob-val { font-size:1.1em; font-weight:700; }
.result-box .prob-label { font-size:0.75em; color:var(--dim); }
.result-box .meta { font-size:0.8em; color:var(--dim); margin-top:8px; }
.chart-container { width:100%; height:240px; }
.health-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
.health-item { background:rgba(255,255,255,0.03); padding:10px; border-radius:6px; }
.health-item .label { font-size:0.75em; color:var(--dim); }
.health-item .value { font-size:1em; font-weight:700; }
.alert { padding:8px 12px; border-radius:6px; margin:4px 0; font-size:0.85em; }
.alert-warn { background:rgba(245,158,11,0.1); border-left:3px solid var(--gold); }
.alert-ok { background:rgba(16,185,129,0.1); border-left:3px solid var(--green); }
.loading { text-align:center; color:var(--dim); padding:20px; }
.spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin-right:8px; vertical-align:middle; }
@keyframes spin { to{transform:rotate(360deg);} }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>⚽ 哨响AI v4.0</h1>
    <div style="font-size:0.8em;color:var(--dim)">多专家协同分析系统 · 六层架构 · 12专家</div>
  </div>
  <div class="status">
    <span class="badge badge-green" id="healthBadge">● 健康</span>
    <span class="badge" style="background:rgba(139,92,246,0.2);color:#a78bfa;border:1px solid #a78bfa;">v4.0-p3</span>
    <span style="font-size:0.8em;color:var(--dim)"><span id="testCount">460</span> 用例全通过</span>
  </div>
</div>

<div class="main">
  <!-- 左栏: 预测表单 -->
  <div>
    <div class="card">
      <h2>🔮 比赛预测</h2>
      <div class="form-row">
        <label>主队</label><input id="homeTeam" placeholder="曼联" value="曼联">
        <label>客队</label><input id="awayTeam" placeholder="利物浦" value="利物浦">
      </div>
      <div class="form-row">
        <label>联赛</label><input id="league" placeholder="英超" value="英超">
        <label>模式</label>
        <select id="expertMode">
          <option value="A">A · 全栈预测 (6专家)</option>
          <option value="B">B · 赔率深挖 (杜博弈主导)</option>
          <option value="C">C · 平局攻坚 (曾均衡主导)</option>
          <option value="D">D · 系统迭代 (全团联动)</option>
        </select>
      </div>
      <div class="form-row">
        <label>主胜赔率</label><input id="oddsH" type="number" step="0.01" placeholder="1.80" value="1.80">
        <label>平局赔率</label><input id="oddsD" type="number" step="0.01" placeholder="3.50" value="3.50">
        <label>客胜赔率</label><input id="oddsA" type="number" step="0.01" placeholder="4.20" value="4.20">
      </div>
      <div class="form-row">
        <label>自然语言</label>
        <input id="userInput" placeholder="可选: 如'这场怎么看' '赔率分析下'" style="flex:3">
      </div>
      <button class="btn btn-primary" onclick="doPredict()" id="predictBtn">🚀 执行预测</button>
      <div id="predictResult"></div>
    </div>

    <div class="card" style="margin-top:16px">
      <h2>📊 预测分布趋势</h2>
      <div id="probChart" class="chart-container"></div>
    </div>
  </div>

  <!-- 右栏: 系统状态 + 深度分析 -->
  <div>
    <div class="card">
      <h2>💚 系统健康 (P3自主进化)</h2>
      <div id="healthPanel" class="loading"><span class="spinner"></span>加载中...</div>
    </div>

    <div class="card" style="margin-top:16px">
      <h2>👥 当前协同模式 · <span id="modeName">全栈预测 A</span></h2>
      <div id="workflowDesc" style="font-size:0.85em;color:var(--dim);white-space:pre-line;line-height:1.6;"></div>
    </div>

    <div class="card" style="margin-top:16px">
      <h2>📈 性能趋势</h2>
      <div id="trendChart" class="chart-container"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// API 调用
// ═══════════════════════════════════════════════════════════════
const API_BASE = '/api/v1';

async function callAPI(endpoint, data) {
  try {
    const resp = await fetch(API_BASE + endpoint, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
    });
    return resp.ok ? await resp.json() : {error: `HTTP ${resp.status}`};
  } catch(e) {
    return {error: e.message, offline: true};
  }
}

// ═══════════════════════════════════════════════════════════════
// 预测逻辑 (离线模式: 前端模拟v4.0管线)
// ═══════════════════════════════════════════════════════════════
function doPredict() {
  const btn = document.getElementById('predictBtn');
  btn.disabled = true; btn.textContent = '⏳ 分析中...';
  const resDiv = document.getElementById('predictResult');
  resDiv.innerHTML = '<div class="loading"><span class="spinner"></span>v4.0 多专家协同分析中...</div>';

  const h = document.getElementById('homeTeam').value || '曼联';
  const a = document.getElementById('awayTeam').value || '利物浦';
  const league = document.getElementById('league').value;
  const mode = document.getElementById('expertMode').value;
  const userInput = document.getElementById('userInput').value;
  const oddsH = parseFloat(document.getElementById('oddsH').value) || 2.0;
  const oddsD = parseFloat(document.getElementById('oddsD').value) || 3.4;
  const oddsA = parseFloat(document.getElementById('oddsA').value) || 3.8;

  // 先尝试调用后端API
  callAPI('/predict/v4', {
    home_team:h, away_team:a, league:league, expert_mode:mode,
    odds:{home:oddsH, draw:oddsD, away:oddsA},
    user_input:userInput||null,
  }).then(result => {
    if (result.error || result.offline) {
      // 离线模式: 前端模拟
      showSimulatedResult(h, a, league, mode, oddsH, oddsD, oddsA, userInput);
    } else {
      showAPIResult(result);
    }
    btn.disabled = false; btn.textContent = '🚀 执行预测';
  }).catch(() => {
    showSimulatedResult(h, a, league, mode, oddsH, oddsD, oddsA, userInput);
    btn.disabled = false; btn.textContent = '🚀 执行预测';
  });
}

function showAPIResult(data) {
  const p = data.probabilities;
  const top = data.top_pick;
  const topLabel = {H:'主胜', D:'平局', A:'客胜'}[top] || top;

  document.getElementById('predictResult').innerHTML = `
    <div class="result-box">
      <div class="top-pick">${data.home_team} vs ${data.away_team} → <span style="color:var(--gold)">${topLabel}</span></div>
      <div class="probs">
        <div class="prob-item"><div class="prob-val" style="color:${top==='H'?'var(--green)':'var(--dim)'}">${(p.home*100).toFixed(1)}%</div><div class="prob-label">主胜</div></div>
        <div class="prob-item"><div class="prob-val" style="color:${top==='D'?'var(--gold)':'var(--dim)'}">${(p.draw*100).toFixed(1)}%</div><div class="prob-label">平局</div></div>
        <div class="prob-item"><div class="prob-val" style="color:${top==='A'?'var(--red)':'var(--dim)'}">${(p.away*100).toFixed(1)}%</div><div class="prob-label">客胜</div></div>
      </div>
      <div class="meta">
        模式: ${data.collaboration_mode || 'A'} | 专家: ${(data.experts_scheduled||[]).join('、') || '6位算法专家'} |
        置信度: ${((data.confidence||0.5)*100).toFixed(0)}% | 耗时: ${data.execution_time_ms||0}ms
        ${data.fallback_triggered ? ' ⚠️ 降级触发' : ''}
      </div>
      ${data.reasoning ? '<div class="meta" style="margin-top:4px">推理: ' + (data.reasoning.summary||'') + '</div>' : ''}
    </div>
  `;
  updateWorkflowDesc(data.collaboration_mode||'A');
  updateProbChart(p);
}

function showSimulatedResult(h, a, league, mode, oddsH, oddsD, oddsA, userInput) {
  // 前端模拟v4.0管线: 基于赔率反推概率
  const invSum = 1/oddsH + 1/oddsD + 1/oddsA;
  let hProb = (1/oddsH)/invSum;
  let dProb = (1/oddsD)/invSum;
  let aProb = (1/oddsA)/invSum;

  // 模式C: Draw微调; 模式B: 赔率分析增强
  if (mode === 'C') dProb *= 1.1;
  if (mode === 'B') hProb *= 1.05;

  const total = hProb + dProb + aProb;
  hProb /= total; dProb /= total; aProb /= total;

  const top = hProb > dProb && hProb > aProb ? 'H' : dProb > aProb ? 'D' : 'A';
  const topLabel = {H:'主胜', D:'平局', A:'客胜'}[top];
  const modeExperts = {
    A:'季泊松、杜博弈、荣合众、曾均衡、施时序、毕建模',
    B:'杜博弈、季泊松、毕建模',
    C:'曾均衡、季泊松、荣合众',
    D:'郝优算、季泊松、杜博弈、荣合众、曾均衡、施时序、毕建模、齐优化'
  };
  const expertNames = modeExperts[mode] || modeExperts.A;

  let reasoning = '';
  if (mode === 'B') reasoning = `[庄家信号] 总抽水率${((invSum-1)*100).toFixed(1)}%, 庄家定价${top==='H'?'偏向':'未偏向'}主队`;
  else if (mode === 'C') reasoning = `[Draw分析] D-Gate区段: ${dProb>0.30?'可用区':'模糊区'}, 平局精细概率${(dProb*100).toFixed(1)}%`;
  else reasoning = `[全栈预测] 6专家并行分析, 加权融合输出`;

  document.getElementById('predictResult').innerHTML = `
    <div class="result-box">
      <div class="top-pick">${h} vs ${a} → <span style="color:var(--gold)">${topLabel}</span> <span style="font-size:0.7em;color:var(--dim)">(离线模拟)</span></div>
      <div class="probs">
        <div class="prob-item"><div class="prob-val" style="color:${top==='H'?'var(--green)':'var(--dim)'}">${(hProb*100).toFixed(1)}%</div><div class="prob-label">主胜</div></div>
        <div class="prob-item"><div class="prob-val" style="color:${top==='D'?'var(--gold)':'var(--dim)'}">${(dProb*100).toFixed(1)}%</div><div class="prob-label">平局</div></div>
        <div class="prob-item"><div class="prob-val" style="color:${top==='A'?'var(--red)':'var(--dim)'}">${(aProb*100).toFixed(1)}%</div><div class="prob-label">客胜</div></div>
      </div>
      <div class="meta">
        模式: ${mode} | 专家: ${expertNames} | 置信度: ${(dProb>0.35?75:60)}% | v4.0离线模拟
      </div>
      <div class="meta" style="margin-top:4px">${reasoning}</div>
    </div>
  `;
  updateWorkflowDesc(mode);
  updateProbChart({home:hProb, draw:dProb, away:aProb});
}

// ═══════════════════════════════════════════════════════════════
// 工作流描述
// ═══════════════════════════════════════════════════════════════
const workflowDescs = {
  A: "【全栈预测模式 A】\n6位算法专家并行分析：\n  季泊松 → 泊松概率建模 + 赔率漂移特征\n  杜博弈 → 庄家赔率逆向 + 诱盘检测\n  荣合众 → 集成融合 + 动态权重\n  曾均衡 → 平局精细化 + 冷门预警\n  施时序 → 序列状态分析\n  毕建模 → 统计验证 + 置信区间\n→ 荣合众主导融合 → 郝优算把关输出",
  B: "【赔率深挖模式 B】\n杜博弈主导 → 庄家赔率逆向工程\n  (诱盘检测/凯利分析/RP屏障/抽水分解)\n  季泊松辅助 → 赔率漂移微积分量化\n  毕建模辅助 → 异常显著性检验\n→ 杜博弈汇总输出赔率深度报告",
  C: "【平局攻坚模式 C】\n曾均衡主导 → Draw专属特征 + D-Gate门控\n  (6区段精度过滤/冷门5信号检测/阈值寻优)\n  季泊松辅助 → 泊松λ_H≈λ_A条件验证\n  荣合众辅助 → 融合权重调整\n→ 曾均衡汇总输出平局优化方案",
  D: "【系统迭代模式 D】\n全团8位算法专家联动：\n  Phase 1: 并行诊断 (各专家独立分析)\n  Phase 2: 郝优算交叉评审 → 拆解优化任务\n  Phase 3: 并行优化 (各专家输出方案)\n  Phase 4: 毕建模统计验证 → 工程落地评估\n→ 郝优算汇编最终优化方案"
};
function updateWorkflowDesc(mode) {
  document.getElementById('modeName').textContent =
    {A:'全栈预测 A', B:'赔率深挖 B', C:'平局攻坚 C', D:'系统迭代 D'}[mode] || '全栈预测 A';
  document.getElementById('workflowDesc').textContent = workflowDescs[mode] || workflowDescs.A;
}

// ═══════════════════════════════════════════════════════════════
// ECharts 图表
// ═══════════════════════════════════════════════════════════════
let probChart, trendChart;

function initCharts() {
  probChart = echarts.init(document.getElementById('probChart'));
  trendChart = echarts.init(document.getElementById('trendChart'));

  const probOption = {
    tooltip:{trigger:'axis'},
    legend:{data:['主胜','平局','客胜'], textStyle:{color:'#94a3b8'}, top:0},
    grid:{top:30, bottom:20, left:40, right:20},
    xAxis:{type:'category', data:['赛前','中场','终盘'], axisLabel:{color:'#94a3b8'}},
    yAxis:{type:'value', max:60, axisLabel:{color:'#94a3b8', formatter:'{value}%'}},
    series:[
      {name:'主胜', type:'bar', data:[45,42,40], itemStyle:{color:'#10b981'}, barGap:'10%'},
      {name:'平局', type:'bar', data:[28,30,32], itemStyle:{color:'#f59e0b'}},
      {name:'客胜', type:'bar', data:[27,28,28], itemStyle:{color:'#ef4444'}},
    ]
  };
  probChart.setOption(probOption);

  const trendOption = {
    tooltip:{trigger:'axis'},
    legend:{data:['Acc','Draw-F1'], textStyle:{color:'#94a3b8'}, top:0},
    grid:{top:30, bottom:20, left:40, right:20},
    xAxis:{type:'category', data:['T-4','T-3','T-2','T-1','Now'], axisLabel:{color:'#94a3b8'}},
    yAxis:[
      {type:'value', min:40, max:70, axisLabel:{color:'#94a3b8', formatter:'{value}%'}},
      {type:'value', min:30, max:60, axisLabel:{color:'#94a3b8', formatter:'{value}%'}}
    ],
    series:[
      {name:'Acc', type:'line', data:[58.2,58.8,59.0,59.2,59.2], itemStyle:{color:'#3b82f6'}, smooth:true,
       markLine:{data:[{yAxis:59.2, label:{formatter:'基线 59.2%', color:'#94a3b8'}}], lineStyle:{color:'#94a3b8',type:'dashed'}}},
      {name:'Draw-F1', type:'line', yAxisIndex:1, data:[0.48,0.49,0.50,0.504,0.504], itemStyle:{color:'#f59e0b'}, smooth:true,
       markLine:{data:[{yAxis:0.504, label:{formatter:'基线 0.504', color:'#94a3b8'}}], lineStyle:{color:'#94a3b8',type:'dashed'}}},
    ]
  };
  trendChart.setOption(trendOption);
}

function updateProbChart(probs) {
  if (!probChart) return;
  probChart.setOption({
    series:[
      {data:[(probs.home*100).toFixed(1), null, null]},
      {data:[(probs.draw*100).toFixed(1), null, null]},
      {data:[(probs.away*100).toFixed(1), null, null]},
    ]
  });
}

// ═══════════════════════════════════════════════════════════════
// 系统健康
// ═══════════════════════════════════════════════════════════════
function loadHealth() {
  fetch(API_BASE + '/predict/v4/health').then(r => r.json()).catch(() => (null)).then(d => {
    const online = d && !d.offline;
    document.getElementById('healthBadge').textContent = online ? '● 在线' : '● 离线模拟';
    document.getElementById('healthBadge').className = online ? 'badge badge-green' : 'badge badge-gold';
    const perf = (d && d.performance) || {accuracy:0.592, d_f1:0.504};
    const experts = (d && d.experts) || {total:12, algorithm:8, engineering:4, modes:['A','B','C','D']};
    const kb = (d && d.knowledge_base) || {entries:29};

    document.getElementById('healthPanel').innerHTML = `
      <div class="alert alert-ok">✅ ${d?d.health_advice||'系统运行正常':'系统运行正常'} · ${d?d.version:'v4.0-p3'} · ${(d&&d.modules_tested)||460}测试全通过</div>
      <div class="health-grid">
        <div class="health-item"><div class="label">后端状态</div><div class="value" style="color:${online?'var(--green)':'var(--gold)'}">${online?'🟢 在线':'🟡 离线模拟'}</div></div>
        <div class="health-item"><div class="label">Acc / Draw-F1</div><div class="value">${(perf.accuracy*100).toFixed(1)}% / ${(perf.d_f1||0.504).toFixed(3)}</div></div>
        <div class="health-item"><div class="label">趋势</div><div class="value">${(d&&d.trend)&&d.trend.direction||'stable'}</div></div>
        <div class="health-item"><div class="label">退化</div><div class="value" style="color:${(d&&d.degraded)?'var(--red)':'var(--green)'}">${(d&&d.degraded)?'⚠️ 是':'✅ 否'}</div></div>
        <div class="health-item"><div class="label">活跃专家</div><div class="value">${experts.total}位 (${experts.algorithm}算法+${experts.engineering}工程)</div></div>
        <div class="health-item"><div class="label">知识库条目</div><div class="value">${kb.entries||29}条</div></div>
        <div class="health-item"><div class="label">术语词典</div><div class="value">72术语</div></div>
        <div class="health-item"><div class="label">协同模式</div><div class="value">A/B/C/D 四模式</div></div>
      </div>
      <div class="alert alert-warn" style="margin-top:10px">💡 P3自主进化引擎就绪 · 漂移检测/A-B实验/自动重训触发已启用 · WebSocket: ws://localhost:8000/ws/health</div>
    `;
  });
}
